<!DOCTYPE html>
<html>  
<head>
  <title>Portfolio Webpage</title>
</head>

<body>

  <h1>My Portfolio Website</h1>

  <!-- 🔊 Button add kiya -->
  <button onclick="speakText()">🔊 Listen</button>
  <button onclick="stopSpeech()">⏹ Stop</button>

  <h2>ABOUT ME</h2>
  <p id="about">My Self Ankit Varma Student of Information Technology</p>

  <h2>Skill</h2>
  <ul id="skills">
    <li>JAVA</li>
    <li>DBMS</li>
    <li>JDBC</li>
  </ul>

  <h2>Project</h2>
  <div id="projects">
    <p>1. College Complaint Management System</p>
    <p>2. Auto Tank Shoot Game (Python)</p>
  </div>

  <h2>Contact</h2>
  <div id="contact">
    <p>Email: av350971@gmail.com</p>
    <p>Mob: 7987361896</p>
  </div>

  <!-- 🔊 JavaScript yahi add kiya -->
  <script>
    function speakText() {
      let text = 
        document.getElementById("about").innerText + " " +
        document.getElementById("skills").innerText + " " +
        document.getElementById("projects").innerText + " " +
        document.getElementById("contact").innerText;

      const speech = new SpeechSynthesisUtterance(text);

      speech.lang = "en-US";  // change to hi-IN for Hindi
      speech.rate = 1;
      speech.pitch = 1;

      window.speechSynthesis.speak(speech);
    }

    function stopSpeech() {
      window.speechSynthesis.cancel();
    }
  </script>

</body>
</html>
